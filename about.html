<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6366f1">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <title>Tentang · Test Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="page-shell selection:bg-indigo-500/20 text-slate-100 min-h-screen flex flex-col">
    <header class="app-topbar">
        <div class="app-topbar__inner max-w-xl">
            <div>
                <p class="text-[9px] font-black uppercase tracking-[0.25em] text-indigo-400/90 mb-0.5">Test Link</p>
                <h1 id="aboutTitle" class="text-2xl font-black text-white italic tracking-tight">Tentang</h1>
            </div>
            <a href="/" class="text-[10px] font-black uppercase tracking-widest text-indigo-400 hover:text-white shrink-0">← Worker</a>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-4 py-8 flex-1 w-full">
        <div id="aboutBody" class="text-sm text-slate-400 leading-relaxed whitespace-pre-wrap font-medium"></div>

        <div class="mt-10 border-t border-slate-800 pt-8">
            <h2 class="text-xs font-black text-white uppercase tracking-widest mb-4">Changelog Riwayat Update</h2>
            <div id="changelogBody" class="text-sm text-slate-400 leading-relaxed font-medium prose-invert markdown-content"></div>
        </div>
    </main>

    <footer class="site-footer mt-auto" role="contentinfo">
        <div class="site-footer__inner">
            <div class="site-footer__brand">
                <span class="site-footer__label">Test Link</span>
                <span class="site-footer__dot" aria-hidden="true"></span>
                <span class="site-footer__cr">© <span id="aboutFooterYear"></span></span>
            </div>
            <p class="site-footer__credit">
                <a href="https://signal.me/#eu/FpZSd_PViBDXqQBWjTRhw0PtNF47vL0YIcJb7960UjsTB8u-tLxO_oKmVspN2xvA" target="_blank" rel="noopener noreferrer" class="site-footer__link">IDR-AH-B组 Artupski</a>
            </p>
            <p class="site-footer__meta"><a href="/" class="site-footer__link site-footer__link--muted">Beranda worker</a></p>
        </div>
    </footer>

    <style>
        .markdown-content h1 {
            font-size: 2.25rem;
            font-weight: 900;
            color: white;
            margin-top: 0.5rem;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
            font-style: italic;
        }
        .markdown-content h2 {
            font-size: 1.5rem;
            font-weight: 900;
            color: #a5f3fc;
            margin-top: 2rem;
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
            border-bottom: 2px solid rgba(99, 102, 241, 0.3);
            padding-bottom: 0.75rem;
        }
        .markdown-content h3 {
            font-size: 0.875rem;
            font-weight: 900;
            color: white;
            margin-top: 1.25rem;
            margin-bottom: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.5rem 1rem;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.25) 0%, rgba(99, 102, 241, 0.15) 100%);
            border-left: 4px solid #6366f1;
            border-radius: 0.375rem;
            display: inline-block;
        }
        .markdown-content p {
            margin-bottom: 0.75rem;
            color: #cbd5e1;
            line-height: 1.625;
        }
        .markdown-content ul {
            margin-bottom: 1rem;
            margin-left: 1rem;
            space-y: 0.5rem;
        }
        .markdown-content li {
            color: #cbd5e1;
            margin-left: 0.5rem;
            list-style: none;
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .markdown-content li::before {
            content: "▸";
            color: #6366f1;
            font-weight: bold;
            position: absolute;
            left: 0;
            font-size: 1.1rem;
        }
        .markdown-content strong {
            font-weight: 900;
            color: #a5f3fc;
        }
        .markdown-content em {
            font-style: italic;
            color: #e2e8f0;
        }
        .markdown-content code {
            background-color: rgba(30, 41, 59, 0.8);
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            color: #06b6d4;
            font-family: monospace;
            font-size: 0.875rem;
            border: 1px solid #334155;
        }
        .markdown-content pre {
            background-color: rgba(15, 23, 42, 0.6);
            padding: 1rem;
            border-radius: 0.375rem;
            margin-bottom: 1rem;
            overflow-x: auto;
            border: 1px solid #334155;
        }
        .markdown-content pre code {
            background-color: transparent;
            padding: 0;
            color: #cbd5e1;
            border: none;
        }
        .markdown-content a {
            color: #6366f1;
            text-decoration: underline;
            text-decoration-thickness: 2px;
            text-underline-offset: 0.25rem;
        }
        .markdown-content a:hover {
            color: #a5f3fc;
        }
        .markdown-content blockquote {
            border-left: 4px solid #6366f1;
            padding-left: 1rem;
            font-style: italic;
            color: #94a3b8;
            margin: 1rem 0;
            background-color: rgba(15, 23, 42, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 0.25rem;
        }
        .markdown-content hr {
            margin: 2rem 0;
            border-top: 2px solid #334155;
        }
    </style>

    <script>
        document.getElementById('aboutFooterYear').textContent = new Date().getFullYear();
        
        /**
         * Enhance markdown content dengan styling yang lebih baik menggunakan DOM manipulation
         */
        function enhanceChangelogDOM() {
            const container = document.getElementById('changelogBody');
            if (!container) return;
            
            // Style semua h3 tags (Added, Changed, Fixed)
            container.querySelectorAll('h3').forEach((h3) => {
                const text = h3.textContent.trim();
                if (['Added', 'Changed', 'Fixed'].includes(text)) {
                    h3.style.display = 'inline-block';
                    h3.style.background = 'linear-gradient(135deg, rgba(99, 102, 241, 0.3) 0%, rgba(99, 102, 241, 0.15) 100%)';
                    h3.style.borderLeft = '4px solid #6366f1';
                    h3.style.padding = '0.5rem 1rem';
                    h3.style.borderRadius = '0.375rem';
                    h3.style.fontSize = '0.875rem';
                    h3.style.fontWeight = '900';
                    h3.style.textTransform = 'uppercase';
                    h3.style.letterSpacing = '0.1em';
                    h3.style.color = 'white';
                    h3.style.marginTop = '1.25rem';
                    h3.style.marginBottom = '0.75rem';
                }
            });
            
            // Style semua h2 tags (version entries)
            container.querySelectorAll('h2').forEach((h2) => {
                h2.style.fontSize = '1.5rem';
                h2.style.fontWeight = '900';
                h2.style.color = '#a5f3fc';
                h2.style.marginTop = '2rem';
                h2.style.marginBottom = '1rem';
                h2.style.letterSpacing = '0.05em';
                h2.style.borderBottom = '2px solid rgba(99, 102, 241, 0.3)';
                h2.style.paddingBottom = '0.75rem';
            });
            
            // Style h1
            container.querySelectorAll('h1').forEach((h1) => {
                h1.style.fontSize = '2.25rem';
                h1.style.fontWeight = '900';
                h1.style.color = 'white';
                h1.style.marginTop = '0.5rem';
                h1.style.marginBottom = '1rem';
                h1.style.letterSpacing = '-0.02em';
                h1.style.fontStyle = 'italic';
            });
            
            // Style strong tags
            container.querySelectorAll('strong').forEach((strong) => {
                strong.style.fontWeight = '900';
                strong.style.color = '#a5f3fc';
            });
        }
        
        (async function () {
            try {
                const r = await fetch('/api/settings');
                const j = await r.json();
                const s = j.settings || {};
                document.getElementById('aboutTitle').textContent = s.about_page_title || 'Tentang';
                document.title = (s.about_page_title || 'Tentang') + ' · Test Link';
                document.getElementById('aboutBody').textContent = s.about_page_body || 'Belum ada konten. Atur di Admin → tab Tentang.';
            } catch (e) {
                document.getElementById('aboutBody').textContent = 'Gagal memuat pengaturan dari server.';
            }

            try {
                const cl = await fetch('/CHANGELOG.md');
                if (cl.ok) {
                    const text = await cl.text();
                    // Render markdown menjadi HTML menggunakan marked.js
                    const html = marked.parse(text);
                    document.getElementById('changelogBody').innerHTML = html;
                    
                    // Apply enhancements dengan multiple fallbacks
                    requestAnimationFrame(() => enhanceChangelogDOM());
                    setTimeout(() => enhanceChangelogDOM(), 50);
                    setTimeout(() => enhanceChangelogDOM(), 200);
                } else {
                    document.getElementById('changelogBody').innerHTML = `
                        <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.5); border-radius: 0.375rem; padding: 0.75rem; color: #fca5a5; font-size: 0.875rem;">
                            Changelog tidak tersedia (HTTP ${cl.status})
                        </div>
                    `;
                }
            } catch (e) {
                document.getElementById('changelogBody').innerHTML = `
                    <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.5); border-radius: 0.375rem; padding: 0.75rem; color: #fca5a5; font-size: 0.875rem;">
                        Gagal memuat changelog: ${e.message}
                    </div>
                `;
            }
        })();
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(function () {});
        }
    </script>
</body>
</html>
