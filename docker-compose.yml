version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./api:/app/api
      - ./js:/app/js
      - ./css:/app/css
      - ./data:/app/data
      - ./icons:/app/icons
      - ./index.html:/app/index.html
      - ./about.html:/app/about.html
      - ./admin.html:/app/admin.html
      - ./403.html:/app/403.html
      - ./404.html:/app/404.html
      - ./500.html:/app/500.html
      - ./manifest.webmanifest:/app/manifest.webmanifest
      - ./sw.js:/app/sw.js
      - ./vercel.json:/app/vercel.json
    environment:
      - NODE_ENV=development
    command: npm run dev

  # Jika project menggunakan MySQL, uncomment dan sesuaikan:
  # db:
  #   image: mysql:8.0
  #   environment:
  #     MYSQL_ROOT_PASSWORD: rootpassword
  #     MYSQL_DATABASE: testlink
  #     MYSQL_USER: user
  #     MYSQL_PASSWORD: password
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - mysql_data:/var/lib/mysql

  # phpmyadmin:
  #   image: phpmyadmin/phpmyadmin
  #   environment:
  #     PMA_HOST: db
  #     PMA_PORT: 3306
  #   ports:
  #     - "8080:80"
